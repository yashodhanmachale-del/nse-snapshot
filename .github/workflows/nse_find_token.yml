name: Find Smallcap Token

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Find Smallcap Token
        env:
          ANGEL_API_KEY:     ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_ID:   ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_PASSWORD:    ${{ secrets.ANGEL_PASSWORD }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os, pyotp, time
          from SmartApi import SmartConnect

          obj  = SmartConnect(api_key=os.environ["ANGEL_API_KEY"])
          totp = pyotp.TOTP(os.environ["ANGEL_TOTP_SECRET"]).now()
          data = obj.generateSession(os.environ["ANGEL_CLIENT_ID"], os.environ["ANGEL_PASSWORD"], totp)
          print("Login:", data["status"])

          TOKENS = [
              ("99926000", "Nifty 50 REF"),
              ("99926009", "Bank Nifty REF"),
              ("99926050", "T50"), ("99926051", "T51"),
              ("99926052", "T52"), ("99926053", "T53"),
              ("99926054", "T54"), ("99926055", "T55"),
              ("99926056", "T56"), ("99926057", "T57"),
              ("99926058", "T58"), ("99926059", "T59"),
              ("99926060", "T60"), ("99926061", "T61"),
              ("99926062", "T62"), ("99926063", "T63"),
              ("99926064", "T64"), ("99926065", "T65"),
              ("99926066", "T66"), ("99926067", "T67"),
              ("99926068", "T68"), ("99926069", "T69"),
              ("99926070", "T70"), ("99926071", "T71"),
              ("99926072", "T72"), ("99926073", "T73"),
              ("99926074", "T74"), ("99926075", "T75"),
          ]

          print("\nToken     | LTP          | Close        | Label")
          print("-" * 55)
          for token, label in TOKENS:
              try:
                  r = obj.ltpData("NSE", label, token)
                  if r.get("status") and r.get("data"):
                      ltp   = r["data"].get("ltp",   "?")
                      close = r["data"].get("close", "?")
                      print(f"{token} | {str(ltp):12} | {str(close):12} | {label}")
                  else:
                      print(f"{token} | NO DATA      |              | {r.get('message','')}")
              except Exception as e:
                  print(f"{token} | ERROR        |              | {e}")
              time.sleep(0.4)
          print("\nCompare LTP with Nifty Smallcap 50 on nseindia.com")
          PYEOF
