name: NSE Market Snapshot

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Snapshot label (e.g. 0915). Leave blank for current time.'
        required: false
        default: ''
  schedule:
    - cron: "45 3 * * 1-5"
    - cron: "50 3 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "15 4 * * 1-5"
    - cron: "30 4 * * 1-5"
    - cron: "0 8 * * 1-5"
    - cron: "45 9 * * 1-5"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE Snapshot
        env:
          ANGEL_API_KEY:          ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_ID:        ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_PASSWORD:         ${{ secrets.ANGEL_PASSWORD }}
          ANGEL_TOTP_SECRET:      ${{ secrets.ANGEL_TOTP_SECRET }}
          GMAIL_SENDER:           ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:        ${{ secrets.RECIPIENT_EMAIL }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          SERVICE_ACCOUNT_JSON:   ${{ secrets.SERVICE_ACCOUNT_JSON }}
          MANUAL_LABEL:           ${{ github.event.inputs.label }}
        run: python snapshot_cloud.py

      - name: Upload Excel as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NSE-Snapshot-${{ github.run_id }}
          path: output/*.xlsx
          retention-days: 30
